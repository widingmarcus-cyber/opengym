name: Bug Report
description: Report a bug in the OpenGym CLI or challenges
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I run opengym score 001, I get..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the bug.
      value: |
        1. Run `opengym fetch 001`
        2. Run `opengym score 001`
        3. See error...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: OpenGym version
      description: "Run `opengym --version`"
      placeholder: "0.2.0"

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows

  - type: input
    id: python
    attributes:
      label: Python version
      description: "Run `python --version`"
      placeholder: "3.12.0"

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any error messages or traceback.
      render: shell
