name: CI Pipeline

on: push

jobs:
  test:
  runs-on: ubuntu-20.04
  steps:
    - name: Checkout code

    - name: Set up Python
      uses: actions/setup-python@v4
        with:
          python-version: "3.11"

    - name: Install dependencies
        run: pip install -r requirements.txt

    - name: Run tests
      run: pytest
